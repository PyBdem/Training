<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Entrainement — Benoit</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#1D9E75;--green-dark:#0F6E56;--green-deep:#085041;
  --green-light:#E1F5EE;--green-mid:#9FE1CB;
  --amber:#EF9F27;--amber-light:#FAEEDA;--amber-dark:#854F0B;
  --text:#1A1A18;--text-muted:#5F5E5A;--text-faint:#888780;
  --bg:#F8F7F4;--surface:#FFFFFF;
  --border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.14);
  --radius:12px;--radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --green:#5DCAA5;--green-dark:#9FE1CB;--green-deep:#E1F5EE;
  --green-light:#085041;--green-mid:#0F6E56;
  --amber:#FAC775;--amber-light:#412402;--amber-dark:#FAC775;
  --text:#F1EFE8;--text-muted:#B4B2A9;--text-faint:#888780;
  --bg:#141412;--surface:#1C1C1A;
  --border:rgba(255,255,255,0.07);--border-strong:rgba(255,255,255,0.12);
}}
html,body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;font-size:15px;line-height:1.5}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative}

/* Header */
.header{background:var(--green-dark);padding:calc(var(--safe-top) + 14px) 20px 14px;flex-shrink:0}
.header-top{display:flex;justify-content:space-between;align-items:flex-start}
.header-label{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--green-mid);margin-bottom:2px}
.header-title{font-size:20px;font-weight:600;color:#fff}
.header-phase{font-size:12px;color:var(--green-mid);margin-top:2px}
.week-badge{background:rgba(255,255,255,.12);border-radius:20px;padding:4px 10px;font-size:12px;color:#fff;font-weight:500;font-family:'DM Mono',monospace}

/* Day strip */
.day-strip{background:var(--green-deep);padding:10px 16px 12px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.day-strip::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid transparent;background:transparent;cursor:pointer;transition:all .15s;min-width:52px}
.day-btn.active-day{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15)}
.day-btn.selected{background:var(--green);border-color:var(--green-mid)}
.day-btn-label{font-size:10px;font-weight:500;color:var(--green-mid);letter-spacing:.06em;text-transform:uppercase}
.day-btn.selected .day-btn-label{color:#fff}
.day-btn-icon{font-size:11px;font-weight:600;color:#fff}
.day-btn-type{font-size:9px;color:rgba(255,255,255,.5)}
.day-btn.selected .day-btn-type{color:rgba(255,255,255,.8)}
.day-dot{width:4px;height:4px;border-radius:50%;background:var(--green);margin-top:2px}
.day-btn.selected .day-dot{background:#fff}
.day-btn.rest-day .day-btn-icon{color:rgba(255,255,255,.35)}

/* Tabs */
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 16px;flex-shrink:0}
.tab-btn{flex:1;padding:11px 4px;font-size:11px;font-weight:500;color:var(--text-faint);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;text-align:center}
.tab-btn.active{color:var(--green-deep);border-bottom-color:var(--green-dark);font-weight:600}

/* Scroll */
.scroll-content{flex:1;overflow-y:auto;padding:16px 16px calc(var(--safe-bottom) + 80px);-webkit-overflow-scrolling:touch}

/* Session */
.session-header{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;margin-bottom:12px}
.session-title{font-size:16px;font-weight:600;margin-bottom:2px}
.session-sub{font-size:12px;color:var(--text-muted)}
.session-meta{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.meta-chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--green-dark);color:#fff}

.section-block{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.section-title{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);padding:10px 16px 8px;border-bottom:1px solid var(--border)}

/* Exercise row */
.ex-row{border-bottom:1px solid var(--border)}
.ex-row:last-child{border-bottom:none}
.ex-main{display:flex;align-items:flex-start;gap:12px;padding:11px 16px}
.ex-num{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--text-faint);min-width:20px;padding-top:2px}
.ex-body{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:500;color:var(--text)}
.ex-detail{font-size:12px;color:var(--text-muted);margin-top:2px;line-height:1.4}
.ex-tag{display:inline-block;font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:4px;background:var(--green-dark);color:#fff;margin-left:6px;vertical-align:middle}
.ex-actions{display:flex;gap:6px;flex-shrink:0;align-items:flex-start;padding-top:1px}
.ex-icon-btn{background:none;border:none;cursor:pointer;padding:2px;color:var(--text-faint);font-size:16px;line-height:1;transition:color .15s}
.ex-icon-btn:active{color:var(--green)}

/* Last entry badge under exercise name */
.ex-last{display:inline-flex;align-items:center;gap:4px;margin-top:4px;font-size:11px;font-weight:600;color:var(--green-deep);background:#fff;border:1.5px solid var(--green);border-radius:20px;padding:2px 8px}
.ex-last-pr{color:var(--amber-dark);background:#fff;border-color:var(--amber)}

/* Photo panel */
.ex-photo-panel{display:none;padding:0 16px 12px}
.ex-photo-panel.open{display:block}
.ex-photo-panel img{width:100%;border-radius:var(--radius-sm);object-fit:contain;height:auto;display:block;background:var(--bg)}
.ex-photo-caption{font-size:11px;color:var(--text-faint);margin-top:5px;text-align:center}

/* Timer bar */
.timer-bar{display:flex;align-items:center;gap:10px;padding:8px 16px 10px;background:var(--bg);border-top:1px solid var(--border)}
.timer-btn{background:var(--green);color:#fff;border:none;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.timer-btn:active{background:var(--green-dark)}
.timer-label{font-size:11px;color:var(--text-faint);flex:1}

/* Log entry panel */
.log-panel{display:none;padding:10px 16px 14px;border-top:1px solid var(--border);background:var(--bg)}
.log-panel.open{display:block}
.log-inputs{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.log-input{flex:1;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:8px 10px;font-size:14px;font-family:'DM Mono',monospace;font-weight:500;color:var(--text);outline:none;text-align:center;-moz-appearance:textfield}
.log-input::-webkit-inner-spin-button,.log-input::-webkit-outer-spin-button{-webkit-appearance:none}
.log-input:focus{border-color:var(--green)}
.log-input-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);text-align:center;margin-top:3px}
.log-x{font-size:16px;color:var(--text-faint);font-weight:500;padding:0 2px;flex-shrink:0}
.log-save-btn{background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0}
.log-save-btn:active{background:var(--green-dark)}

/* History rows */
.log-history{display:flex;flex-direction:column;gap:5px}
.log-hist-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-faint);margin-bottom:4px}
.log-hist-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border)}
.log-hist-date{font-size:11px;color:var(--text-faint)}
.log-hist-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--text)}
.log-hist-pr{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;background:var(--amber-dark);color:#fff;border-radius:10px;padding:1px 6px;margin-left:6px}

/* Global timer overlay */
.timer-overlay{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--green-deep);color:#fff;padding:14px 20px calc(var(--safe-bottom) + 14px);display:none;align-items:center;gap:14px;z-index:100;border-top:1px solid rgba(255,255,255,.15)}
.timer-overlay.visible{display:flex}
.timer-overlay-time{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:#fff;min-width:60px}
.timer-overlay-label{flex:1;font-size:13px;color:var(--green-mid)}
.timer-overlay-cancel{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}

/* Coach tip */
.coach-tip{background:var(--green-deep);border-left:3px solid var(--green);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:12px 14px;margin-bottom:10px}
.coach-tip-label{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--green-mid);margin-bottom:4px}
.coach-tip-text{font-size:13px;color:#fff;line-height:1.5}

/* Rest / prog / principes */
.rest-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:12px}
.rest-title{font-size:18px;font-weight:600}
.rest-text{font-size:14px;color:var(--text-muted);max-width:260px;line-height:1.6}
.prog-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.prog-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px}
.prog-row:last-child{border-bottom:none}
.prog-label{font-size:12px;font-weight:600;color:var(--green-dark);min-width:100px;font-family:'DM Mono',monospace}
.prog-text{color:var(--text-muted);text-align:right;line-height:1.4}
.principle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.principle-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:12px 14px}
.principle-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px}
.principle-desc{font-size:11px;color:var(--text-muted);line-height:1.5}
.info-banner{background:var(--green-deep);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px}
.info-banner-title{font-size:12px;font-weight:600;color:#fff;margin-bottom:3px}
.info-banner-text{font-size:12px;color:rgba(255,255,255,0.85);line-height:1.5}
</style>
</head>

     {name:'Marche 5 min', detail:'Echauffement',tag:null,rest:0,photo:null,logKey:null},
     {name:'Course Zone 2',detail:'25-35 min — meme rythme que lundi',tag:null,rest:0,photo:null,logKey:null},
     {name:'Marche 5 min', detail:'Retour au calme',tag:null,rest:0,photo:null,logKey:null}
   ]}],
   tip:"Profites-en pour courir dehors si possible."},
];

// ── STORAGE ──────────────────────────────────────────────────────────────
// Format: { [logKey]: [ {date:'2026-04-17', poids:45, reps:12}, ... ] }
function loadLog() {
  try { return JSON.parse(localStorage.getItem('benoit_log') || '{}'); } catch(e) { return {}; }
}
function saveLog(log) {
  localStorage.setItem('benoit_log', JSON.stringify(log));
}
function addEntry(logKey, poids, reps) {
  const log = loadLog();
  if (!log[logKey]) log[logKey] = [];
  const today = new Date().toISOString().slice(0,10);
  // Remove existing entry for today if any
  log[logKey] = log[logKey].filter(e => e.date !== today);
  log[logKey].push({date: today, poids: parseFloat(poids), reps: parseInt(reps)});
  // Keep only last 30 entries
  log[logKey] = log[logKey].slice(-30);
  saveLog(log);
}
function getHistory(logKey, n=3) {
  const log = loadLog();
  return (log[logKey] || []).slice(-n).reverse();
}
function getMaxPoids(logKey) {
  const log = loadLog();
  const entries = log[logKey] || [];
  if (!entries.length) return null;
  return Math.max(...entries.map(e => e.poids));
}
function formatDate(str) {
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('fr-CA', {month:'short', day:'numeric'});
}

// ── TIMER ────────────────────────────────────────────────────────────────
let timerInterval = null;
let timerLeft = 0;
function startTimer(seconds, exName) {
  if (timerInterval) clearInterval(timerInterval);
  timerLeft = seconds;
  const overlay = document.getElementById('timerOverlay');
  const overlayTime = document.getElementById('overlayTime');
  document.getElementById('overlayLabel').textContent = exName;
  overlay.classList.add('visible');
  overlayTime.textContent = timerLeft;
  timerInterval = setInterval(() => {
    timerLeft--;
    overlayTime.textContent = timerLeft;
    if (timerLeft <= 0) {
      clearInterval(timerInterval); timerInterval = null;
      overlay.classList.remove('visible');
      if ('vibrate' in navigator) navigator.vibrate([200,100,200]);
    }
  }, 1000);
}
function cancelTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('timerOverlay').classList.remove('visible');
}

// ── PHOTO TOGGLE ─────────────────────────────────────────────────────────
function togglePhoto(id) {
  const panel = document.getElementById('photo-' + id);
  if (!panel) return;
  const open = panel.classList.toggle('open');
  const btn = document.getElementById('photobtn-' + id);
  if (btn) btn.textContent = open ? '✕' : '📷';
}

// ── LOG PANEL TOGGLE ──────────────────────────────────────────────────────
function toggleLog(id) {
  const panel = document.getElementById('log-' + id);
  if (!panel) return;
  panel.classList.toggle('open');
}

function saveEntry(id, logKey) {
  const p = document.getElementById('input-poids-' + id);
  const r = document.getElementById('input-reps-' + id);
  const poids = parseFloat(p.value);
  const reps = parseInt(r.value);
  if (!poids || !reps || isNaN(poids) || isNaN(reps)) return;
  addEntry(logKey, poids, reps);
  // Refresh the log panel
  renderLogPanel(id, logKey);
  // Update the last entry badge
  renderLastBadge(id, logKey);
  p.value = '';
  r.value = '';
}

function renderLogPanel(id, logKey) {
  const hist = getHistory(logKey, 3);
  const maxP = getMaxPoids(logKey);
  const container = document.getElementById('log-hist-' + id);
  if (!container) return;
  if (!hist.length) {
    container.innerHTML = '<div style="font-size:12px;color:var(--text-faint);text-align:center;padding:4px 0">Aucune entree encore</div>';
    return;
  }
  container.innerHTML = hist.map(e => {
    const isPR = e.poids === maxP;
    return `<div class="log-hist-row">
      <span class="log-hist-date">${formatDate(e.date)}</span>
      <span><span class="log-hist-val">${e.poids} lbs x ${e.reps}</span>${isPR ? '<span class="log-hist-pr">PR</span>' : ''}</span>
    </div>`;
  }).join('');
}

function renderLastBadge(id, logKey) {
  const hist = getHistory(logKey, 1);
  const badge = document.getElementById('badge-' + id);
  if (!badge) return;
  if (!hist.length) { badge.style.display = 'none'; return; }
  const e = hist[0];
  const maxP = getMaxPoids(logKey);
  const isPR = e.poids === maxP;
  badge.style.display = 'inline-flex';
  badge.className = 'ex-last' + (isPR ? ' ex-last-pr' : '');
  badge.textContent = e.poids + ' lbs x ' + e.reps + (isPR ? ' PR' : '');
}

// ── STATE ─────────────────────────────────────────────────────────────────
let selectedDay = new Date().getDay();
let activeTab = 'session';

// ── RENDER STRIP ──────────────────────────────────────────────────────────
function renderStrip() {
  const strip = document.getElementById('dayStrip');
  strip.innerHTML = '';
  days.forEach((d, i) => {
    const btn = document.createElement('button');
    let cls = 'day-btn';
    if (d.active) cls += ' active-day';
    if (d.rest) cls += ' rest-day';
    if (i === selectedDay) cls += ' selected';
    btn.className = cls;
    btn.innerHTML = `<span class="day-btn-label">${d.label}</span><span class="day-btn-icon">${d.short}</span><span class="day-btn-type">${d.type}</span>${d.active ? '<span class="day-dot"></span>' : '<span style="height:4px"></span>'}`;
    btn.onclick = () => { selectedDay = i; renderStrip(); renderContent(); };
    strip.appendChild(btn);
  });
  const sel = strip.children[selectedDay];
  if (sel) sel.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

// ── SWITCH TAB ────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['session','progression','principes','journal'][i] === tab);
  });
  renderContent();
}

// ── RENDER CONTENT ────────────────────────────────────────────────────────
function renderContent() {
  const el = document.getElementById('scrollContent');
  const d = days[selectedDay];

  if (activeTab === 'progression') {
    el.innerHTML = `<div class="info-banner"><div class="info-banner-title">Regle d'or</div><div class="info-banner-text">Jamais plus de 10% d'augmentation de volume par semaine.</div></div>
    <div class="prog-card">${[
      ['Sem. 1–2','Charges legeres (60-65%). Priorite : forme parfaite.'],
      ['Sem. 3–4','15 reps propres 2 seances de suite = +2.5-5 lbs.'],
      ['Sem. 5–6','Descendre a 10-12 reps avec charges plus lourdes.'],
      ['Sem. 7–8','Bilan : ajouter un exercice libre simple.'],
      ['Course 1–4','35 min Zone 2 max.'],
      ['Course 5–8','+5 min/semaine. Max 50 min.']
    ].map(([l,t])=>`<div class="prog-row"><span class="prog-label">${l}</span><span class="prog-text">${t}</span></div>`).join('')}</div>`;
    return;
  }

  if (activeTab === 'principes') {
    el.innerHTML = `<div class="principle-grid">${[
      ['Machines d\'abord','Guidees, securitaires. Force avant les poids libres.'],
      ['Rameur','Corps entier, faible impact. Echauffement ideal.'],
      ['Zone 2','Combustion des graisses maximale.'],
      ['Ven. = OFF','La croissance se passe au repos.'],
      ['5-6 jours','Garde le rythme sans te detruire.'],
      ['Phase 1','8 semaines = fondations solides.']
    ].map(([n,desc])=>`<div class="principle-card"><div class="principle-name">${n}</div><div class="principle-desc">${desc}</div></div>`).join('')}</div>`;
    return;
  }

  if (activeTab === 'journal') {
    renderJournal(el);
    return;
  }

  // ── SESSION ───────────────────────────────────────────────────────────
  if (d.rest) {
    el.innerHTML = `<div class="rest-screen"><div style="font-size:32px;color:var(--text-faint)">—</div><div class="rest-title">Repos complet</div><div class="rest-text">Sommeil, hydratation, nutrition. C'est aujourd'hui que les muscles se reparent.</div></div>`;
    return;
  }

  let html = `<div class="session-header"><div class="session-title">${d.title}</div><div class="session-sub">${d.sub}</div>${d.chips?`<div class="session-meta">${d.chips.map(c=>`<span class="meta-chip">${c}</span>`).join('')}</div>`:''}</div>`;

  d.sections.forEach(sec => {
    html += `<div class="section-block"><div class="section-title">${sec.name}</div>`;
    sec.items.forEach((item, i) => {
      const uid = `d${selectedDay}-${sec.name.replace(/\s/g,'')}-${i}`;
      const hasPhoto = item.photo && PHOTOS[item.photo];
      const hasTimer = item.rest > 0;
      const hasLog   = !!item.logKey;

      html += `<div class="ex-row"><div class="ex-main">
        <div class="ex-num">${i+1}</div>
        <div class="ex-body">
          <div class="ex-name">${item.name}${item.tag?`<span class="ex-tag">${item.tag}</span>`:''}</div>
          <div class="ex-detail">${item.detail}</div>
          ${hasLog ? `<span class="ex-last" id="badge-${uid}" style="display:none"></span>` : ''}
        </div>
        <div class="ex-actions">
          ${hasPhoto ? `<button class="ex-icon-btn" id="photobtn-${uid}" onclick="togglePhoto('${uid}')">📷</button>` : ''}
          ${hasLog   ? `<button class="ex-icon-btn" onclick="toggleLog('${uid}')" title="Inscrire poids">✏️</button>` : ''}
        </div>
      </div>`;

      if (hasPhoto) {
        const p = PHOTOS[item.photo];
        html += `<div class="ex-photo-panel" id="photo-${uid}"><img src="${p.url}" alt="${p.cap}" loading="lazy"><div class="ex-photo-caption">${p.cap}</div></div>`;
      }

      if (hasLog) {
        html += `<div class="log-panel" id="log-${uid}">
          <div class="log-inputs">
            <div>
              <input class="log-input" type="number" id="input-poids-${uid}" placeholder="45" min="0" step="2.5" style="width:80px">
              <div class="log-input-label">lbs</div>
            </div>
            <div class="log-x">x</div>
            <div>
              <input class="log-input" type="number" id="input-reps-${uid}" placeholder="12" min="1" step="1" style="width:64px">
              <div class="log-input-label">reps</div>
            </div>
            <button class="log-save-btn" onclick="saveEntry('${uid}','${item.logKey}')">Sauvegarder</button>
          </div>
          <div class="log-hist-title">3 dernieres seances</div>
          <div class="log-history" id="log-hist-${uid}"></div>
        </div>`;
      }

      if (hasTimer) {
        html += `<div class="timer-bar"><button class="timer-btn" onclick="startTimer(${item.rest},'${item.name.replace(/'/g,"\\'")}')">Repos ${item.rest}s</button><span class="timer-label">Appuie apres ta serie</span></div>`;
      }

      html += `</div>`;
    });
    html += `</div>`;
  });

  if (d.tip) html += `<div class="coach-tip"><div class="coach-tip-label">Coach Tremblay</div><div class="coach-tip-text">${d.tip}</div></div>`;
  el.innerHTML = html;
  el.scrollTop = 0;

  // Populate badges and history panels after render
  d.sections.forEach(sec => {
    sec.items.forEach((item, i) => {
      if (!item.logKey) return;
      const uid = `d${selectedDay}-${sec.name.replace(/\s/g,'')}-${i}`;
      renderLastBadge(uid, item.logKey);
      renderLogPanel(uid, item.logKey);
    });
  });
}

// ── JOURNAL VIEW ─────────────────────────────────────────────────────────
function renderJournal(el) {
  const log = loadLog();
  const allKeys = Object.keys(log).filter(k => log[k].length > 0);

  if (!allKeys.length) {
    el.innerHTML = `<div class="rest-screen"><div style="font-size:32px;color:var(--text-faint)">✏️</div><div class="rest-title">Journal vide</div><div class="rest-text">Inscris tes poids pendant une session — ils apparaitront ici.</div></div>`;
    return;
  }

  // Build name map from plan
  const nameMap = {};
  days.forEach(d => {
    if (!d.sections) return;
    d.sections.forEach(sec => sec.items.forEach(item => {
      if (item.logKey) nameMap[item.logKey] = item.name;
    }));
  });

  let html = '';
  allKeys.forEach(key => {
    const entries = [...log[key]].reverse().slice(0,3);
    const maxP = Math.max(...log[key].map(e=>e.poids));
    const name = nameMap[key] || key;
    html += `<div class="section-block" style="margin-bottom:10px">
      <div class="section-title">${name}</div>`;
    entries.forEach(e => {
      const isPR = e.poids === maxP;
      html += `<div class="log-hist-row" style="padding:10px 16px;display:flex;justify-content:space-between;border-bottom:1px solid var(--border)">
        <span class="log-hist-date">${formatDate(e.date)}</span>
        <span><span class="log-hist-val">${e.poids} lbs x ${e.reps}</span>${isPR?'<span class="log-hist-pr">PR</span>':''}</span>
      </div>`;
    });
    html += `</div>`;
  });

  el.innerHTML = html;
  el.scrollTop = 0;
}

// ── INIT ──────────────────────────────────────────────────────────────────
renderStrip();
renderContent();
</script>
</body>
</html>
